  .actions{display:flex; flex-direction:column; gap:10px; margin-top:16px;}
  .row2{display:flex; gap:10px;} .row2 .btn{flex:1;}

</style>

<script>

// F 行为 → 三轴效果（F=框架方向；图钱/不图钱 → P）
const BEHAVIOR_EFF = {
  '装傻':     {dL:-4, dF:-18, dP:0},
  '情绪价值': {dL:2,  dF:-10, dP:0},

const BEHAVIOR_SIG = {

// 通用行为台词

  '拿捏':['「你这样的，我见得多了。」你挑眉，气场全开。','「想让我多看你一眼？先拿出点本事。」','你云淡风轻地反将一军，他一下被架住。'],

const VOICE = {

const VENUES = ['YC(夜场)','饭局','游艇派对','五星酒店大堂','omakase','水烟吧','酒局'];

const SCENES = [
  {title:'开场', slots:['松弛','情绪价值','不图钱'], promptPool:[]},
  {title:'身份试探', slots:['节奏','装傻','图钱'], promptPool:['{target}给你斟上酒：「你是做什么的？看着不像普通人。」','{target}打量着你：「谁带你进这个圈子的？」']},

function makeBag(arr){ let bag=[],last=null; return function(){ if(!bag.length){ bag=shuffle(arr.slice()); if(bag.length>1&&bag[bag.length-1]===last){[bag[0],bag[bag.length-1]]=[bag[bag.length-1],bag[0]];} } last=bag.pop(); return last; }; }
const drawTarget=makeBag(TARGETS);

function getDex(){ try{return JSON.parse(localStorage.getItem(DEX_KEY)||'[]');}catch(e){return [];} }
function unlock(id){ const d=getDex(); if(!d.includes(id)){ d.push(id); try{localStorage.setItem(DEX_KEY,JSON.stringify(d));}catch(e){} } }
function getCards(){ try{return JSON.parse(localStorage.getItem(CARD_KEY)||'{}');}catch(e){return {};} }
function saveCard(r){ const m=getCards(); m[r.id]={id:r.id,group:r.group,title:r.title,judge:r.judge,body:r.body,panel:r.panel,badges:r.badges,personaName:r.personaName,targetName:r.targetName,sceneName:r.sceneName,share:r.share}; try{localStorage.setItem(CARD_KEY,JSON.stringify(m));}catch(e){} }

// 开局：F必出，A/C/D/E 各 65%，B 50%（风味）；人设 L=各词符号和
function roll(){
  const target=drawTarget(), venue=rand(VENUES);
  const order=['D','E','A','B','C','F'], probs={A:.65,B:.5,C:.65,D:.65,E:.65,F:1};
  const parts=[]; let L=0, ftype='';
  order.forEach(col=>{ if(col==='F'||Math.random()<probs[col]){ const pk=rand(PCOLS[col]); L+=pk.L; parts.push(pk.w); if(col==='F')ftype=pk.w; } });
  L=clampS(L);
  S={ target, venue, ftype, personaName:parts.join('·'), L, F:0, P:0, heat:0, step:0, combo:0, maxCombo:0, badges:new Set(), used:new Set(), curOpts:null, curStep:-1 };
  S.heat=clamp(34 + target.weight.L*Math.sign(target.want.L)*(L/100)*30);
}

function pickLine(tag){
  const v=VOICE[S.ftype]&&VOICE[S.ftype][tag];
  let pool=(v&&v.length)?v.slice():BLINES[tag].slice();
  let avail=pool.filter(l=>!S.used.has(l)); if(!avail.length)avail=pool;
  const label=rand(avail); S.used.add(label);
  return {label,tag};
}
function buildOptions(){ return shuffle(SCENES[S.step].slots.map(pickLine)); }

// 三轴 delta（画像条）+ 上头 = 行为方向签名 × 大哥加权口味（对称）
function applyChoice(opt){
  const e=BEHAVIOR_EFF[opt.tag], sg=BEHAVIOR_SIG[opt.tag];
  S.L=clampS(S.L+e.dL); S.F=clampS(S.F+e.dF); S.P=clampS(S.P+e.dP);
  const w=S.target.weight, want=S.target.want;
  const align = w.L*Math.sign(want.L)*sg.L + w.F*Math.sign(want.F)*sg.F + w.P*Math.sign(want.P)*sg.P;
  const lmatch = w.L*Math.sign(want.L)*(S.L/100); // 人设 L 持续契合
  S.heat=clamp(S.heat + align*13 + lmatch*2);
  const type = align>=0.32?'hit' : align>=0.08?'good' : align>-0.2?'cold' : 'zap';
  if(type==='hit'){ S.combo++; S.maxCombo=Math.max(S.maxCombo,S.combo); } else S.combo=0;
  return {type, bad:(type==='zap')};
}

function classifyGroup(){ const h=S.heat; return h>=70?'大结果':h>=45?'小结果':h>=20?'没结果':'负结果'; }
function pickEnding(){
  const h=S.heat,L=S.L,F=S.F,P=S.P, g=classifyGroup();
  if(g==='大结果'){
    if(P>=28) return h>=88?'songchuguo':'kept';        // 图钱明确 → 送出国/包养
    if(F>=25) return (P<=-12 && h>=90)?'reverse':'marry'; // 强框架 → 反向拿捏/结婚
    if(F<=-15) return h>=86?'guanqilai':'house';        // 低框架高上头 → 被独占关起来
    return 'house';
  }
  if(g==='小结果'){
    if(P>=15) return L>=0?'bojin':'che';
    return L>=0?'chanel':'biao';
  }
  if(g==='没结果'){
    if(F<=-18) return 'peipao';
    if(P>=15) return 'meishangzhuo';
    if(L<=-15) return 'liuyc';
    return 'bairuju';
  }
  if(P>=22 && F<=0) return 'fanbei';
  if(P>=8) return 'daokui';
  return 'chawu';
}

function interp(s){ return s.replace(/\{persona\}/g,S.personaName).replace(/\{target\}/g,S.target.name).replace(/\{venue\}/g,S.venue); }
function fmtAxis(v,neg,pos){ return v>=8?('+'+v+' '+pos): v<=-8?(v+' '+neg):'±0 中性'; }

function composeVerdict(forceId){
  const id=forceId||pickEnding(); const v=VERDICT[id]; unlock(id);
  const bd=[];
  bd.push('#'+S.ftype);
  bd.push(S.L>=25?'#高级人设':S.L<=-25?'#接地气人设':'#路人缘');
  bd.push(S.F>=25?'#强框架':S.F<=-25?'#倒贴选手':'#佛系框架');
  bd.push(S.P>=20?'#图钱明确':S.P<=-20?'#不图钱':'#随缘要价');
  if(S.heat>=85)bd.push('#他彻底沦陷'); else if(S.heat<=20)bd.push('#查无兴趣');
  if(S.maxCombo>=3)bd.push('#连击拿捏×'+S.maxCombo);
  bd.push('#'+S.venue.replace(/\(.*\)/,''));
  if(v.group==='大结果')bd.push('#命中他的菜');
  const title=rand(v.titles);
  const result={ id, v, group:v.group, title, judge:rand(v.judges), body:interp(rand(v.bodies)),
    panel:{ heat:S.heat, L:fmtAxis(S.L,'土甜','高级'), F:fmtAxis(S.F,'倒贴','拿捏'), P:fmtAxis(S.P,'纯情','图钱'), roi:v.reward+' · '+v.roi },
    badges:bd.slice(0,9), personaName:S.personaName, targetName:S.target.name, sceneName:S.venue,
    share:`我在《大结果》抽到「${S.personaName}」，10轮拿捏「${S.target.name}」，鉴定为【${title}】(${v.group})。上头值${S.heat}。你敢来吗？` };
  saveCard(result); track('end',{id:result.id,group:result.group,target:result.targetName}); return result;
}

/* 弹幕 & toast */
function spawnDanmu(text,i){
  const layer=document.getElementById('danmu');
  const el=document.createElement('div'); el.className='dm'; el.textContent=text;
  el.style.top=(90+Math.random()*300)+'px';
  const dur=2.6+Math.random()*1.1;
  el.style.animation=`fly ${dur}s linear forwards`; el.style.animationDelay=(i*0.16)+'s';
  layer.appendChild(el); setTimeout(()=>el.remove(),(dur+i*0.16)*1000+200);
}
function fireDanmu(list){ list.forEach((t,i)=>spawnDanmu(t,i)); }
function toast(msg){ const el=document.createElement('div'); el.className='toast'; el.textContent=msg; document.body.appendChild(el);
  setTimeout(()=>{el.style.opacity='0'; el.style.transition='opacity .3s';},1400); setTimeout(()=>el.remove(),1800); }

/* 轻量后端监控：部署到 Cloudflare 后生效；本地 file:// 自动跳过、永不报错阻塞游戏 */
function track(ev,extra){
  try{ if(location.protocol==='file:') return;
    var body=JSON.stringify(Object.assign({ev:ev,t:Date.now()},extra||{}));
    if(navigator.sendBeacon){ navigator.sendBeacon('/api/track', new Blob([body],{type:'application/json'})); }
    else{ fetch('/api/track',{method:'POST',body:body,keepalive:true}).catch(function(){}); }
  }catch(e){}
}

/* =========================================================
   一键导出 PNG（Canvas 手绘，零外部依赖）
   ========================================================= */
function roundRect(ctx,x,y,w,h,r){ if(w<2*r)r=w/2; if(h<2*r)r=h/2; ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
function wrapCJK(ctx,text,maxW){ const lines=[]; let line=''; for(const ch of String(text)){ if(ch==='\n'){lines.push(line);line='';continue;} const t=line+ch; if(line&&ctx.measureText(t).width>maxW){lines.push(line);line=ch;} else line=t; } if(line)lines.push(line); return lines; }
function gcolors(grad){ return (grad.match(/#[0-9a-fA-F]{6}/g))||['#ff6ec4','#b078ff']; }

function drawCard(r){
  const v=r.v, W=1080, CP=64, innerW=W-CP*2;
  const c=document.createElement('canvas'), ctx=c.getContext('2d');
  const font=(w,s)=>(w?w+' ':'')+s+'px -apple-system,"PingFang SC","Microsoft YaHei","Segoe UI",sans-serif';
  const cols=gcolors(v.grad);

  ctx.font=font('bold',72); const titleLines=wrapCJK(ctx,r.title,innerW-120);
  ctx.font=font('bold',40); const judgeLines=wrapCJK(ctx,r.judge,innerW-56);
  ctx.font=font('',34);     const bodyLines=wrapCJK(ctx,r.body,innerW);
  ctx.font=font('bold',28); const chipPadX=22,chipH=54,chipGap=14;
  const chips=r.badges.map(b=>({t:b,w:ctx.measureText(b).width+chipPadX*2}));
  const badgeRows=[]; let row=[],rw=0; chips.forEach(ch=>{ if(rw+ch.w>innerW&&row.length){badgeRows.push(row);row=[];rw=0;} row.push(ch); rw+=ch.w+chipGap; }); if(row.length)badgeRows.push(row);

  const rarityH=54, cellH=116;
  let H=64; H+=rarityH+22; H+=titleLines.length*84+6; H+=34+30;
  const judgeBoxH=judgeLines.length*58+44; H+=judgeBoxH+30;
  H+=bodyLines.length*54+34; H+=cellH*3+16*2+34;
  H+=badgeRows.length*chipH+(badgeRows.length-1)*chipGap+34; H+=28+40+34+48;
  c.width=W; c.height=Math.ceil(H);

  ctx.fillStyle='#0d0a14'; ctx.fillRect(0,0,W,H);
  const M=18; let g=ctx.createLinearGradient(0,0,W,H); cols.forEach((col,i)=>g.addColorStop(i/((cols.length-1)||1),col));
  roundRect(ctx,M,M,W-2*M,H-2*M,44); ctx.fillStyle=g; ctx.fill();
  roundRect(ctx,M+8,M+8,W-2*M-16,H-2*M-16,36); ctx.fillStyle='#17112a'; ctx.fill();

  // emoji 头图
  ctx.font=font('',82); ctx.textAlign='right'; ctx.textBaseline='top'; ctx.fillText(TIER_EMOJI[r.id]||'🎴', W-CP, 46); ctx.textAlign='left';

  let yy=64;
  ctx.font=font('bold',30); const pillTxt=r.group; const pillW=ctx.measureText(pillTxt).width+44;
  const pg=ctx.createLinearGradient(CP,0,CP+pillW,0); cols.forEach((col,i)=>pg.addColorStop(i/((cols.length-1)||1),col));
  roundRect(ctx,CP,yy,pillW,rarityH,rarityH/2); ctx.fillStyle=pg; ctx.fill();
  ctx.fillStyle='#160f22'; ctx.textBaseline='middle'; ctx.textAlign='left'; ctx.fillText(pillTxt,CP+22,yy+rarityH/2+1); yy+=rarityH+22;

  ctx.font=font('bold',72); ctx.fillStyle=v.ink; ctx.textBaseline='top'; titleLines.forEach(l=>{ctx.fillText(l,CP,yy);yy+=84;}); yy+=6;

  let subFs=26, sub='《大结果》· '+r.personaName+' × '+r.targetName; ctx.font=font('',subFs);
  while(ctx.measureText(sub).width>innerW && subFs>17){ subFs-=1; ctx.font=font('',subFs); }
  ctx.fillStyle='#a99ec4'; ctx.fillText(sub,CP,yy); yy+=34+30;

  ctx.font=font('bold',40); const jb_y=yy;
  roundRect(ctx,CP,jb_y,innerW,judgeBoxH,20); ctx.fillStyle='#0e0a18'; ctx.fill();
  ctx.fillStyle='#ffd24a'; roundRect(ctx,CP,jb_y,10,judgeBoxH,5); ctx.fill();
  ctx.fillStyle='#fff'; ctx.textBaseline='top'; let jy=jb_y+22; judgeLines.forEach(l=>{ctx.fillText(l,CP+36,jy);jy+=58;}); yy=jb_y+judgeBoxH+30;

  ctx.font=font('',34); ctx.fillStyle='#e3d8f7'; bodyLines.forEach(l=>{ctx.fillText(l,CP,yy);yy+=54;}); yy+=34;

  const cellW=(innerW-16)/2;
  function cell(x,cy,ww,label,val,vc,fs){ roundRect(ctx,x,cy,ww,cellH,18); ctx.fillStyle='#120c20'; ctx.fill(); ctx.strokeStyle='#2a2040'; ctx.lineWidth=1.5; roundRect(ctx,x,cy,ww,cellH,18); ctx.stroke(); ctx.font=font('',26); ctx.fillStyle='#a99ec4'; ctx.textBaseline='top'; ctx.fillText(label,x+22,cy+20); ctx.font=font('bold',fs||44); ctx.fillStyle=vc; ctx.fillText(val,x+22,cy+54); }
  cell(CP,yy,cellW,'上头值',''+r.panel.heat,'#ffd24a'); cell(CP+cellW+16,yy,cellW,'魅力 L',r.panel.L,'#ff4d8d',34); yy+=cellH+16;
  cell(CP,yy,cellW,'框架 F',r.panel.F,'#39e6d6',34); cell(CP+cellW+16,yy,cellW,'图钱 P',r.panel.P,'#b078ff',34); yy+=cellH+16;
  roundRect(ctx,CP,yy,innerW,cellH,18); ctx.fillStyle='#120c20'; ctx.fill(); ctx.strokeStyle='#2a2040'; ctx.lineWidth=1.5; roundRect(ctx,CP,yy,innerW,cellH,18); ctx.stroke();
  ctx.font=font('',26); ctx.fillStyle='#a99ec4'; ctx.textBaseline='top'; ctx.fillText('本局收成',CP+22,yy+20);
  let fs=38, roiStr=r.panel.roi; ctx.font=font('bold',fs); while(ctx.measureText(roiStr).width>innerW-44&&fs>22){fs-=2; ctx.font=font('bold',fs);} ctx.fillStyle=v.ink; ctx.fillText(roiStr,CP+22,yy+56); yy+=cellH+34;

  ctx.font=font('bold',28); ctx.textBaseline='middle'; let by=yy;
  badgeRows.forEach(rw2=>{ let bx=CP; rw2.forEach(ch=>{ roundRect(ctx,bx,by,ch.w,chipH,chipH/2); ctx.fillStyle='rgba(57,230,214,0.12)'; ctx.fill(); ctx.strokeStyle='rgba(57,230,214,0.45)'; ctx.lineWidth=1.5; roundRect(ctx,bx,by,ch.w,chipH,chipH/2); ctx.stroke(); ctx.fillStyle='#39e6d6'; ctx.textAlign='left'; ctx.fillText(ch.t,bx+chipPadX,by+chipH/2+1); bx+=ch.w+chipGap; }); by+=chipH+chipGap; });
  yy=by+(34-chipGap);

  ctx.strokeStyle='#2a2040'; ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(CP,yy); ctx.lineTo(W-CP,yy); ctx.stroke(); yy+=28;
  ctx.textBaseline='top'; ctx.textAlign='left'; ctx.font=font('bold',30); ctx.fillStyle='#f4eefb'; ctx.fillText('《大结果》· 10 轮拿捏一个富哥',CP,yy);
  ctx.font=font('',26); ctx.fillStyle='#a99ec4'; ctx.fillText('已解锁 '+r.dexCount+'/18 结局 · 你是什么茶？来测你的段位 →',CP,yy+40);
  return c;
}

function exportCard(btn){
  if(!LAST){ toast('先完成一局再保存哦'); return; }
  const old=btn?btn.textContent:''; if(btn){ btn.textContent='🖼 正在生成鉴定书…'; btn.disabled=true; }
  LAST.dexCount=getDex().length;
  setTimeout(function(){
    try{ const canvas=drawCard(LAST);
      canvas.toBlob(function(blob){ if(btn){btn.textContent=old;btn.disabled=false;}
        if(!blob){ toast('生成失败，试试直接截图'); return; }
        const safe=(LAST.title||'鉴定书').replace(/[\\/:*?"<>|·\s]/g,'');
        saveImage(blob, `大结果_${safe}_${Date.now()}.png`);
      },'image/png');
    }catch(e){ if(btn){btn.textContent=old;btn.disabled=false;} toast('生成失败，试试直接截图'); }
  },30);
}
function saveImage(blob,fname){
  const isMobile=/Android|iPhone|iPad|iPod|Mobile|HarmonyOS/i.test(navigator.userAgent);
  if(isMobile && navigator.canShare){
    try{ const file=new File([blob],fname,{type:'image/png'});
      if(navigator.canShare({files:[file]})){
        navigator.share({files:[file], title:'我的茶艺段位鉴定', text:LAST.share})
          .then(()=>toast('在弹出面板里选「保存图片」即可存进相册'))
          .catch(err=>{ if(!/AbortError|cancel/i.test(String(err))) downloadBlob(blob,fname); });
        return;
      }
    }catch(e){}
  }
  downloadBlob(blob,fname);
}
function downloadBlob(blob,fname){ const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download=fname;
  document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(url),5000); toast('图片已导出到「下载」文件夹 ✓'); }

/* 启动 */
window.addEventListener('error',function(e){ track('jserror',{msg:String((e&&e.message)||'').slice(0,120)}); });
renderHome();
</script>
